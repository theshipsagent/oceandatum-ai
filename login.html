    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', -apple-system, sans-serif;
            min-height: 100vh;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding-top: 56px;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: #0a0a0a;
        }

        .bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            opacity: 0.6;
            filter: grayscale(100%) contrast(1.1);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.3) 0%, rgba(0,20,40,0.4) 50%, rgba(0,0,0,0.3) 100%);
        }

        .glass-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .login-container {
            position: relative;
            z-index: 100;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 16px;
            padding: 3rem;
            max-width: 400px;
            width: 100%;
            margin: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1) inset;
        }

        .logo-symbol {
            width: 60px;
            height: 60px;
            color: #ffffff;
            margin: 0 auto 1.5rem;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
        }

        .logo-symbol svg {
            width: 100%;
            height: 100%;
        }

        .login-title {
            font-size: 2rem;
            font-weight: 300;
            color: #ffffff;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }

        .login-subtitle {
            font-size: 0.9rem;
            font-weight: 300;
            font-style: italic;
            color: rgba(255,255,255,0.7);
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            background: rgba(255,255,255,0.08);
            border-color: rgba(100,255,180,0.5);
            box-shadow: 0 0 0 3px rgba(100,255,180,0.1);
        }

        .login-button {
            width: 100%;
            padding: 0.9rem;
            background: rgba(100,255,180,0.1);
            border: 1px solid rgba(100,255,180,0.3);
            border-radius: 8px;
            color: #64ffb4;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-button:hover {
            background: rgba(100,255,180,0.2);
            border-color: rgba(100,255,180,0.5);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(100,255,180,0.2);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .error-message {
            background: rgba(255,100,100,0.1);
            border: 1px solid rgba(255,100,100,0.3);
            border-radius: 8px;
            padding: 0.75rem;
            color: #ff6464;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #64ffb4;
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 2rem;
                margin: 1rem;
            }

            .login-title {
                font-size: 1.5rem;
            }
        }

        /* Navbar */
        .navbar { position:fixed; top:0; left:0; right:0; z-index:1000; display:flex; align-items:center; justify-content:space-between; padding:0.8rem 2rem; background:rgba(10,10,10,0.85); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,0.1); }
        .navbar-brand { font-family:'Space Grotesk',-apple-system,sans-serif; font-size:0.85rem; letter-spacing:0.5px; }
        .navbar-right { display:flex; align-items:center; gap:1rem; }
        .navbar-link { font-family:'Space Grotesk',-apple-system,sans-serif; font-size:0.9rem; color:rgba(255,255,255,0.7); text-decoration:none; padding:6px 14px; border:1px solid rgba(255,255,255,0.15); border-radius:20px; transition:all 0.3s ease; white-space:nowrap; }
        .navbar-link:hover { color:#fff; border-color:rgba(255,255,255,0.4); background:rgba(255,255,255,0.05); }
        .social-icons { display:flex; gap:12px; align-items:center; margin-right:8px; }
        .social-icon { color:rgba(255,255,255,0.5); transition:color 0.3s; display:inline-flex; }
        .social-icon:hover { color:#64ffb4; }
        .hamburger-button { display:none; background:transparent; border: 2px solid rgba(255,255,255,0.3); color:rgba(255,255,255,0.8); font-size:1.4rem; border-radius:8px; cursor:pointer; width: 40px; height: 40px;}
        .hamburger-button:hover { border-color:#64ffb4; color:#64ffb4; }
        .mobile-menu { display:none; position:fixed; top: 60px; left:0; right:0; background:rgba(10,10,10,0.95); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top: 1px solid rgba(100,255,180,0.3); border-bottom: 1px solid rgba(100,255,180,0.3); max-height:0; overflow:hidden; transition:max-height 0.3s ease; z-index:999; }
        .mobile-menu.active { display:block; max-height:500px; }
        .mobile-menu-section { padding:10px 0; }
        .mobile-menu-item a { display:block; padding: 15px 20px; color:rgba(255,255,255,0.8); text-decoration:none; font-size: 1rem; border-bottom:1px solid rgba(255,255,255,0.05); transition:all 0.3s; }
        .mobile-menu-item a:hover { background:rgba(100,255,180,0.1); color:#64ffb4; }
        .mobile-menu-social { display:flex; gap:16px; padding:16px 24px; border-top:1px solid rgba(255,255,255,0.1); }
        @media (max-width:768px) { .hamburger-button { display:block; } .navbar-right { display:none; } .navbar { padding:0.6rem 1rem; } }
    </style>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-input" required autocomplete="current-password">
            </div>

            <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1.5rem">
                <input type="checkbox" id="rememberMe" style="accent-color:#64ffb4;width:16px;height:16px;cursor:pointer">
                <label for="rememberMe" style="font-size:0.85rem;color:rgba(255,255,255,0.6);cursor:pointer">Remember this device</label>
            </div>

            <button type="submit" class="login-button">ENTER</button>
        </form>

        <a href="index.html" class="back-link">&larr; Back to Home</a>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');
        const rememberMe = document.getElementById('rememberMe');

        const _u = atob('dGhlc2hpcHNhZ2VudA==');
        const _p = atob('eWVsbG93cm9zZQ==');

        // Check if already remembered
        if (localStorage.getItem('datum_auth') === 'true') {
            const expires = parseInt(localStorage.getItem('datum_auth_expires') || '0');
            if (Date.now() < expires) {
                sessionStorage.setItem('datum_auth', 'true');
                window.location.href = 'projects-hub.html';
            } else {
                localStorage.removeItem('datum_auth');
                localStorage.removeItem('datum_auth_expires');
            }
        }

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (username === _u && password === _p) {
                sessionStorage.setItem('datum_auth', 'true');
                sessionStorage.setItem('datum_user', username);

                // Remember for 7 days if checked
                if (rememberMe.checked) {
                    localStorage.setItem('datum_auth', 'true');
                    localStorage.setItem('datum_auth_expires', String(Date.now() + 7 * 24 * 60 * 60 * 1000));
                }

                window.location.href = 'projects-hub.html';
            } else {
                errorMessage.classList.add('active');
                passwordInput.value = '';
                loginForm.style.animation = 'shake 0.5s';
                setTimeout(() => { loginForm.style.animation = ''; }, 500);
            }
        });

        usernameInput.addEventListener('input', () => { errorMessage.classList.remove('active'); });
        passwordInput.addEventListener('input', () => { errorMessage.classList.remove('active'); });
    </script>

    <script>
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    if (hamburgerBtn && mobileMenu) {
      hamburgerBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        mobileMenu.classList.toggle('active');
      });
      document.addEventListener('click', function(e) {
        if (!mobileMenu.contains(e.target) && !hamburgerBtn.contains(e.target)) {
          mobileMenu.classList.remove('active');
        }
      });
      mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => mobileMenu.classList.remove('active'));
      });
    }
    </script>

    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
    <script src="od-theme-pdf.js"></script>
</body>
</html>
